<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Крестики-нолики</title>
  <link rel="stylesheet" href="styleV2.css" />
</head>
<body>
  <div class="container">
    <h1>Крестики-нолики</h1>

    <div class="settings">
      <div>
        <label for="player1Symbol">Символ игрока 1:</label>
        <select id="player1Symbol">
          <option value="X">X</option>
          <option value="A">A</option>
          <option value="★">★</option>
        </select>
      </div>

      <div>
        <label for="player2Symbol">Символ игрока 2:</label>
        <select id="player2Symbol">
          <option value="O">O</option>
          <option value="B">B</option>
          <option value="●">●</option>
        </select>
      </div>
    </div>

    <div class="scoreboard">
      <p>Счёт игрока 1: <span id="score1">0</span></p>
      <p>Счёт игрока 2: <span id="score2">0</span></p>
    </div>

    <p id="status">Ход игрока: X</p>

    <div class="board" id="board">
      <button class="cell" data-index="0"></button>
      <button class="cell" data-index="1"></button>
      <button class="cell" data-index="2"></button>
      <button class="cell" data-index="3"></button>
      <button class="cell" data-index="4"></button>
      <button class="cell" data-index="5"></button>
      <button class="cell" data-index="6"></button>
      <button class="cell" data-index="7"></button>
      <button class="cell" data-index="8"></button>
    </div>

    <button id="restartBtn">Начать заново</button>
  </div>

  <script src="scriptV2.js"></script>
</body>
</html>
